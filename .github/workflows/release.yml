name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

jobs:
  release:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build Logger Dependency
        shell: cmd
        run: |
          cd Logger\Customizable_Logger
          if not exist build mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_C_FLAGS="/Z7" -DCMAKE_CXX_FLAGS="/Z7"
          cmake --build . --config Release -- /m:1

      - name: Build GLFW Dependency
        shell: cmd
        run: |
          cd Vendor\GLFW
          if not exist build mkdir build
          cd build
          cmake ../glfw -G "Visual Studio 17 2022" -A x64 -DGLFW_BUILD_DOCS=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_EXAMPLES=OFF -DCMAKE_C_FLAGS="/Z7 /FS" -DCMAKE_CXX_FLAGS="/Z7 /FS"
          cmake --build . --config Release -- /m:1

      - name: Generate Solution with Premake
        shell: cmd
        run: Vendor\Premake\premake5.exe vs2022

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        shell: cmd
        run: msbuild TimeEngine.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Package Binaries
        shell: pwsh
        run: |
             New-Item -ItemType Directory -Force -Path "TimeEngine-Release"
             Copy-Item -Path "Bin/Release-windows-x86_64/Sandbox/Sandbox.exe" -Destination "TimeEngine-Release/"
             Copy-Item -Path "Bin/Release-windows-x86_64/Engine/Engine.dll" -Destination "TimeEngine-Release/"
             Copy-Item -Path "Resources" -Destination "TimeEngine-Release/Resources" -Recurse
             Compress-Archive -Path "TimeEngine-Release/*" -DestinationPath "TimeEngine-Windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: TimeEngine-Windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
