name: Linux Build (Clang)

on:
  pull_request:
    branches: [ main, ecs, editor, gameplay, ui, samples ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux-clang:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install System Dependencies & Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev xorg-dev

      - name: Install Premake5
        run: |
          wget -q https://github.com/premake/premake-core/releases/download/v5.0.0-beta2/premake-5.0.0-beta2-linux.tar.gz
          tar -xzf premake-5.0.0-beta2-linux.tar.gz
          sudo mv premake5 /usr/local/bin/

      - name: Build Logger Dependency (Clang)
        run: |
          mkdir -p Vendor/Customizable_Logger/build
          cd Vendor/Customizable_Logger/build
          cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build . --config Debug

      - name: Build GLFW Dependency (Clang)
        run: |
          mkdir -p Vendor/GLFW/build
          cd Vendor/GLFW/build
          cmake ../glfw -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_DOCS=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_EXAMPLES=OFF -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build . --config Debug

      - name: Generate Makefiles with Premake
        run: premake5 gmake2 --file=Premake5.lua

      - name: Build Solution (Clang)
        run: make config=debug -j$(nproc) CC=clang CXX=clang++
