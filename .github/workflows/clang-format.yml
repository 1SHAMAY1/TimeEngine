name: Clang-Format Check

on:
  pull_request:
    branches: [ main, ecs, editor, gameplay, ui, samples ]

jobs:
  clang-format:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.{h,hpp,c,cpp}
            !Vendor/**
            !Bin/**
            !Bin-Intermediate/**

      - name: Run clang-format and fix
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: pwsh
        run: |
          $changedFiles = "${{ steps.changed-files.outputs.all_changed_files }}"
          if ($changedFiles.Trim() -ne "") {
            $files = $changedFiles -split ' '
            foreach ($file in $files) {
              if (Test-Path $file) {
                Write-Host "Formatting $file"
                clang-format -i $file
              }
            }
          }

      - name: Commit changes
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fix CI: Automated Clang-Format"
