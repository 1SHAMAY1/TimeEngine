name: Windows Build & Merge Safety

on:
  pull_request:
    branches: [ main, ecs, editor, gameplay, ui, samples ]
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: jason-curtis/setup-cmake@v1

      - name: Build Logger Dependency
        working-directory: Logger/Customizable_Logger
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_C_FLAGS="/Z7" -DCMAKE_CXX_FLAGS="/Z7"
          cmake --build . --config Debug -- /m

      - name: Build GLFW Dependency
        working-directory: Vendor/GLFW
        run: |
          mkdir build
          cd build
          cmake ../glfw -G "Visual Studio 17 2022" -A x64 -DGLFW_BUILD_DOCS=OFF -DGLFW_BUILD_TESTS=OFF -DGLFW_BUILD_EXAMPLES=OFF -DCMAKE_C_FLAGS="/Z7 /FS" -DCMAKE_CXX_FLAGS="/Z7 /FS"
          cmake --build . --config Debug -- /m

      - name: Generate Solution with Premake
        run: .\Vendor\Premake\premake5.exe vs2022

      - name: Build Solution
        run: msbuild TimeEngine.sln /p:Configuration=Debug /p:Platform=x64 /m
