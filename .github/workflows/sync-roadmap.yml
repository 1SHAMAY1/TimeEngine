name: Sync Roadmap Milestones

on:
  push:
    paths:
      - 'ROADMAP.md'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'

      - name: Install dependencies
        run: npm install @octokit/action

      - name: Run sync script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the ROADMAP.md file
            const roadmapPath = path.join(process.env.GITHUB_WORKSPACE, 'ROADMAP.md');
            if (!fs.existsSync(roadmapPath)) {
              console.log("ROADMAP.md not found.");
              return;
            }
            const content = fs.readFileSync(roadmapPath, 'utf8');
            const lines = content.split('\n');

            let categories = [];
            let currentCategory = null;
            let currentSection = ""; // "Completed", "Short-Term", "Long-Term"

            for (let line of lines) {
              // Capture section headers (e.g. "## 🟢 Completed Milestones" or "## 🟡 Short-Term Goals")
              const sectionMatch = line.match(/^##\s+.*?(Completed|Short-Term|Long-Term).*$/i);
              if (sectionMatch) {
                currentSection = sectionMatch[1].trim();
                console.log(`Matched Section: ${currentSection}`);
                continue;
              }

              // Capture category headers (### 1. Multi-API Renderer...)
              const categoryMatch = line.match(/^###\s+(.*)$/);
              if (categoryMatch) {
                const sectionPrefix = currentSection ? `[${currentSection}] ` : "";
                currentCategory = {
                  name: `${sectionPrefix}${categoryMatch[1].trim()}`,
                  items: []
                };
                categories.push(currentCategory);
                console.log(`Matched Category: ${currentCategory.name}`);
                continue;
              }

              // Parse list items: - [x] or - [/] or - [ ]
              if (currentCategory) {
                const itemMatch = line.match(/^\s*-\s+\[([ xX\/])\]\s+(.*)$/);
                if (itemMatch) {
                  const state = itemMatch[1].toLowerCase();
                  const description = itemMatch[2].trim();
                  currentCategory.items.push({
                    description,
                    completed: state === 'x',
                    inProgress: state === '/'
                  });
                }
              }
            }

            console.log("Parsed Categories & Checklist Items:", JSON.stringify(categories, null, 2));

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Retrieve all milestones (both open and closed)
            const { data: existingMilestones } = await github.rest.issues.listMilestones({
              owner,
              repo,
              state: 'all'
            });

            console.log(`Existing Milestones count: ${existingMilestones.length}`);

            for (const category of categories) {
              const milestoneTitle = category.name;
              
              const totalItems = category.items.length;
              const completedItems = category.items.filter(i => i.completed).length;
              
              // A milestone is marked as closed if all its items are completed (state === 'x')
              const isCompleted = totalItems > 0 && completedItems === totalItems;
              const targetState = isCompleted ? 'closed' : 'open';

              console.log(`Category: "${milestoneTitle}" | Items: ${completedItems}/${totalItems} completed | Target State: ${targetState}`);

              const match = existingMilestones.find(m => m.title === milestoneTitle);

              if (match) {
                if (match.state !== targetState) {
                  console.log(`Updating Milestone "${milestoneTitle}" from ${match.state} to ${targetState}...`);
                  await github.rest.issues.updateMilestone({
                    owner,
                    repo,
                    milestone_number: match.number,
                    state: targetState
                  });
                } else {
                  console.log(`Milestone "${milestoneTitle}" already matching target state: ${match.state}`);
                }
              } else {
                console.log(`Creating new Milestone "${milestoneTitle}" with state ${targetState}...`);
                await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: milestoneTitle,
                  state: targetState,
                  description: `Tracked from ROADMAP.md. Status: ${completedItems}/${totalItems} completed.`
                });
              }
            }
