name: Sync Roadmap Milestones

on:
  push:
    paths:
      - 'ROADMAP.md'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'

      - name: Install dependencies
        run: npm install @octokit/action

      - name: Run sync script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the ROADMAP.md file
            const roadmapPath = path.join(process.env.GITHUB_WORKSPACE, 'ROADMAP.md');
            if (!fs.existsSync(roadmapPath)) {
              console.log("ROADMAP.md not found.");
              return;
            }
            const content = fs.readFileSync(roadmapPath, 'utf8');
            const lines = content.split('\n');

            let categories = [];
            let currentCategory = null;
            let currentSection = ""; // "Completed", "Short-Term", "Long-Term"

            for (let line of lines) {
              // Capture section headers (e.g. "## 🟢 Completed Milestones" or "## 🟡 Short-Term Goals")
              const sectionMatch = line.match(/^##\s+.*?(Completed|Short-Term|Long-Term).*$/i);
              if (sectionMatch) {
                currentSection = sectionMatch[1].trim();
                continue;
              }

              // Capture category headers (### 1. Multi-API Renderer...)
              const categoryMatch = line.match(/^###\s+(.*)$/);
              if (categoryMatch) {
                const sectionPrefix = currentSection ? `[${currentSection}] ` : "";
                currentCategory = {
                  name: `${sectionPrefix}${categoryMatch[1].trim()}`,
                  rawTitle: categoryMatch[1].trim(),
                  items: [] // Flat list of nested parsed objects
                };
                categories.push(currentCategory);
                continue;
              }

              // Parse items: - [x] or - [/] or - [ ] (supports indentation)
              if (currentCategory) {
                const itemMatch = line.match(/^(\s*)-\s+\[([ xX\/])\]\s+(.*)$/);
                if (itemMatch) {
                  const indent = itemMatch[1].length;
                  const state = itemMatch[2].toLowerCase();
                  const description = itemMatch[3].trim();
                  currentCategory.items.push({
                    indent,
                    state,
                    description
                  });
                }
              }
            }

            console.log("Parsed Categories:", JSON.stringify(categories, null, 2));

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Retrieve all milestones
            const { data: existingMilestones } = await github.rest.issues.listMilestones({
              owner,
              repo,
              state: 'all'
            });

            // Retrieve all issues to locate or create matching tracking issues
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            for (const category of categories) {
              const milestoneTitle = category.name;
              
              // Calculate completion status
              const totalItems = category.items.length;
              const completedItems = category.items.filter(i => i.state === 'x').length;
              const isCompleted = totalItems > 0 && completedItems === totalItems;
              const targetMilestoneState = isCompleted ? 'closed' : 'open';

              let milestone = existingMilestones.find(m => m.title === milestoneTitle);

              // 1. Sync Milestone
              if (milestone) {
                if (milestone.state !== targetMilestoneState) {
                  console.log(`Updating Milestone "${milestoneTitle}" to state: ${targetMilestoneState}`);
                  const res = await github.rest.issues.updateMilestone({
                    owner,
                    repo,
                    milestone_number: milestone.number,
                    state: targetMilestoneState
                  });
                  milestone = res.data;
                }
              } else {
                console.log(`Creating Milestone "${milestoneTitle}"`);
                const res = await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: milestoneTitle,
                  state: targetMilestoneState,
                  description: `Tracked from ROADMAP.md. Status: ${completedItems}/${totalItems} completed.`
                });
                milestone = res.data;
              }

              // 2. Generate the nested checklist body for the Issue
              // Maps state ('x' -> [x], '/' -> [x] (close enough) or [ ] with notes, ' ' -> [ ])
              let issueBody = `This issue tracks progress for milestone **${milestoneTitle}**.\n\n### Task List\n\n`;
              for (const item of category.items) {
                const space = " ".repeat(item.indent);
                let mark = " ";
                if (item.state === 'x') mark = "x";
                // Let's treat ongoing [/] as unfinished but add a label/comment
                const suffix = item.state === '/' ? " *(In Progress)*" : "";
                issueBody += `${space}- [${mark}] ${item.description}${suffix}\n`;
              }
              issueBody += `\n*Last synchronized from ROADMAP.md*`;

              // 3. Sync Tracking Issue representing this category
              const issueTitle = `Tracking: ${milestoneTitle}`;
              let issue = existingIssues.find(i => i.title === issueTitle);
              const targetIssueState = isCompleted ? 'closed' : 'open';

              if (issue) {
                // Update body & status if changed
                if (issue.body !== issueBody || issue.state !== targetIssueState || issue.milestone?.number !== milestone.number) {
                  console.log(`Updating Issue "${issueTitle}"`);
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: issue.number,
                    body: issueBody,
                    state: targetIssueState,
                    milestone: milestone.number
                  });
                }
              } else {
                console.log(`Creating Issue "${issueTitle}"`);
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: issueTitle,
                  body: issueBody,
                  milestone: milestone.number,
                  labels: ['roadmap-tracking']
                });
              }
            }
