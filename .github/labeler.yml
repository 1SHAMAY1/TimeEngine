# Labeler Configuration
# Labels PRs based on changed files using actions/labeler@v5 syntax

CI/CD:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/**/*'

Docs:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - '**/*.txt'

Vendor:
  - changed-files:
    - any-glob-to-any-file:
      - 'Vendor/**/*'
      - '.gitmodules'

AI Agents:
  - changed-files:
    - any-glob-to-any-file:
      - '.agents/**/*'
      - '.agentrules/**/*'
      - '.agentrules'

Automation:
  - changed-files:
    - any-glob-to-any-file:
      - 'Scripts/**/*'
      - 'Premake5.lua'
      - '**/premake5.exe'
      - '**/premake5'

resources:
  - changed-files:
    - any-glob-to-any-file:
      - '**/resources/**/*'
      - '**/Resources/**/*'

projects:
  - changed-files:
    - any-glob-to-any-file: 'Projects/**/*'

application:
  - changed-files:
    - any-glob-to-any-file: 'TimeEditor/**/*'

plugin:
  - changed-files:
    - any-glob-to-any-file: 'Engine/Plugins/**/*'

# Folder tags inside either src or include
Core:
  - changed-files:
    - any-glob-to-any-file:
      - 'Engine/src/Core/**/*'
      - 'Engine/Include/Core/**/*'

