# Labeler Configuration
# Labels PRs based on changed files using actions/labeler@v5 syntax

ECS:
  - changed-files:
      - any-glob-to-any-file: 'Engine/src/ECS/**/*'
      - any-glob-to-any-file: 'Engine/Include/ECS/**/*'

Editor:
  - changed-files:
      - any-glob-to-any-file: 'Engine/src/Core/Layers/**/*'
      - any-glob-to-any-file: 'Engine/Include/Layers/**/*'

Core:
  - changed-files:
      - any-glob-to-any-file: 'Engine/src/Core/**/*'
      - any-glob-to-any-file: 'Engine/Include/Core/**/*'

Renderer:
  - changed-files:
      - any-glob-to-any-file: 'Engine/src/Renderer/**/*'
      - any-glob-to-any-file: 'Engine/Include/Renderer/**/*'

UI:
  - changed-files:
      - any-glob-to-any-file: 'Vendor/IMGUI/**/*'

Samples:
  - changed-files:
      - any-glob-to-any-file: 'Sandbox/**/*'
